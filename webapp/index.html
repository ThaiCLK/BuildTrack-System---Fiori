<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>BuildTrack System</title>
    <style>
        html,
        body,
        body>div,
        #container,
        #container-uiarea {
            height: 100%;
        }
    </style>
    <!-- XLSX library for Daily Log Excel import/export -->
    <!-- Temporarily disable AMD define so XLSX sets window.XLSX instead of registering an AMD module -->
    <script>
        var __savedDefine = window.define;
        window.define = undefined;
    </script>
    <script src="./libs/xlsx.full.min.js"></script>
    <script>
        // Restore define after XLSX is loaded into window.XLSX
        window.define = __savedDefine;
    </script>
    <script id="sap-ui-bootstrap" src="resources/sap-ui-core.js" data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{
        "z.bts.buildtrack551": "./"
    }' data-sap-ui-onInit="module:sap/ui/core/ComponentSupport" data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true">
        </script>
        
    <!-- SAP Joule Web Client Integration (Hướng A - Native SAP) -->
    <!-- TODO: Thay thế YOUR_JOULE_DOMAIN, YOUR_COPILOT_ID và YOUR_HOST_ID bằng thông tin từ SAP BTP Cockpit của bạn -->
    <script 
        src="https://YOUR_JOULE_DOMAIN/webclient/bootstrap.js" 
        data-copilot-id="YOUR_COPILOT_ID" 
        data-host-id="YOUR_HOST_ID"
        id="sap-joule-plugin">
    </script>
</head>

<body class="sapUiBody sapUiSizeCompact" id="content">
    <div data-sap-ui-component data-name="z.bts.buildtrack551" data-id="container"
        data-settings='{"id" : "z.bts.buildtrack551"}' data-handle-validation="true">
    </div>
</body>

</html>
